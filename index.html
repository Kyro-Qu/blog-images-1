<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kyro Blog Images</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f172a;
      --panel: rgba(15, 23, 42, 0.8);
      --line: rgba(148, 163, 184, 0.24);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(56, 189, 248, 0.18), transparent 40%),
        linear-gradient(180deg, #0f172a, #020617);
      color: var(--text);
      font: 16px/1.6 "Segoe UI", "Microsoft YaHei", sans-serif;
    }

    main {
      width: min(720px, 100%);
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--panel);
      box-shadow: 0 24px 80px rgba(2, 6, 23, 0.48);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
    }

    p {
      margin: 0 0 10px;
      color: var(--muted);
    }

    code {
      color: var(--accent);
      font-family: Consolas, "Courier New", monospace;
    }
  </style>
</head>
<body>
  <main>
    <h1>Kyro Blog Images</h1>
    <p>这个仓库用于托管博客文章的外部图片资源。</p>
    <p>推荐目录结构：<code>posts/&lt;slug&gt;/&lt;filename&gt;</code></p>
  </main>
</body>
</html>
